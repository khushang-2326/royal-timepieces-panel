services:
  - type: web
    name: royal-timepieces-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 5001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: royal-timepieces-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # --- ADDING REWRITE RULE FOR REACT ROUTER ---
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: royal-timepieces-api
          property: host
